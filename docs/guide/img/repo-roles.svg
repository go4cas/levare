<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" width="680" height="250" role="img" aria-labelledby="t d">
<title id="t">The three repository roles</title>
<desc id="d">The source repo holds levare itself. The studio repo holds your teams and work. Product repos hold what your teams build.</desc>
<style>
  .th{font:500 14px 'Hanken Grotesk',system-ui,sans-serif}
  .ts{font:400 11px 'IBM Plex Mono',ui-monospace,monospace}
  .cap{font:400 12px 'IBM Plex Mono',ui-monospace,monospace;fill:#6B6F76}
  .a rect{fill:#F1F1F0;stroke:#8A8D93}.a .th{fill:#33363C}.a .ts{fill:#5C6067}
  .b rect{fill:#FBEDEA;stroke:#C2402A}.b .th{fill:#7A2519}.b .ts{fill:#A33722}
  .c rect{fill:#EDF2F8;stroke:#2E6FB0}.c .th{fill:#1B4670}.c .ts{fill:#2A6099}
  .arr{stroke:#8A8D93;stroke-width:1;fill:none}
  @media (prefers-color-scheme:dark){
    .a rect{fill:#232529;stroke:#767A81}.a .th{fill:#D9DBDE}.a .ts{fill:#A0A4AA}
    .b rect{fill:#3A1710;stroke:#D8624B}.b .th{fill:#F5D4CC}.b .ts{fill:#E0907B}
    .c rect{fill:#122236;stroke:#5C9BD8}.c .th{fill:#CFE1F2}.c .ts{fill:#9CC2E5}
    .cap{fill:#8A8D93}.arr{stroke:#767A81}
  }
</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A8D93" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<g class="a"><rect x="30" y="60" width="170" height="66" rx="6" stroke-width="1"/>
<text class="th" x="115" y="88" text-anchor="middle">source</text>
<text class="ts" x="115" y="108" text-anchor="middle">levare itself</text></g>

<g class="b"><rect x="255" y="60" width="170" height="66" rx="6" stroke-width="1"/>
<text class="th" x="340" y="88" text-anchor="middle">studio</text>
<text class="ts" x="340" y="108" text-anchor="middle">where you conduct</text></g>

<g class="c"><rect x="480" y="60" width="170" height="66" rx="6" stroke-width="1"/>
<text class="th" x="565" y="88" text-anchor="middle">product</text>
<text class="ts" x="565" y="108" text-anchor="middle">what gets built</text></g>

<line x1="200" y1="93" x2="251" y2="93" class="arr" marker-end="url(#a)"/>
<line x1="425" y1="93" x2="476" y2="93" class="arr" marker-end="url(#a)"/>

<text class="cap" x="225" y="150" text-anchor="middle">serves</text>
<text class="cap" x="452" y="150" text-anchor="middle">points at</text>

<text class="cap" x="340" y="200" text-anchor="middle">Three separate git repositories. The binary is installed once;</text>
<text class="cap" x="340" y="222" text-anchor="middle">the studio it operates on is a directory you pass to it.</text>
</svg>
