<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280" role="img" aria-labelledby="t d">
<title id="t">An artifact's lifecycle</title>
<desc id="d">An artifact is produced in-review, then approved, rejected, or superseded by a new version.</desc>
<style>
  .th{font:500 14px 'Hanken Grotesk',system-ui,sans-serif}
  .ts{font:400 11px 'IBM Plex Mono',ui-monospace,monospace}
  .cap{font:400 12px 'IBM Plex Mono',ui-monospace,monospace;fill:#6B6F76}
  .n rect{fill:#F1F1F0;stroke:#8A8D93}.n .th{fill:#33363C}
  .g rect{fill:#FAF3E0;stroke:#8A6414}.g .th{fill:#5C4309}
  .ok rect{fill:#E9F2EC;stroke:#2E6B47}.ok .th{fill:#1D4A30}
  .no rect{fill:#F9EBEA;stroke:#A33722}.no .th{fill:#7A2519}
  .arr{stroke:#8A8D93;stroke-width:1;fill:none}
  @media (prefers-color-scheme:dark){
    .n rect{fill:#232529;stroke:#767A81}.n .th{fill:#D9DBDE}
    .g rect{fill:#33280A;stroke:#C79A2E}.g .th{fill:#F0DEA8}
    .ok rect{fill:#12291C;stroke:#4E9268}.ok .th{fill:#BEE0CC}
    .no rect{fill:#3A1710;stroke:#D8624B}.no .th{fill:#F5D4CC}
    .cap{fill:#8A8D93}.arr{stroke:#767A81}
  }
</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A8D93" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<g class="n"><rect x="30" y="90" width="130" height="46" rx="6" stroke-width="1"/>
<text class="th" x="95" y="118" text-anchor="middle">produced</text></g>
<line x1="160" y1="113" x2="196" y2="113" class="arr" marker-end="url(#a)"/>

<g class="g"><rect x="200" y="90" width="130" height="46" rx="6" stroke-width="1"/>
<text class="th" x="265" y="118" text-anchor="middle">in-review</text></g>

<line x1="330" y1="103" x2="446" y2="60" class="arr" marker-end="url(#a)"/>
<line x1="330" y1="113" x2="446" y2="113" class="arr" marker-end="url(#a)"/>
<line x1="330" y1="123" x2="446" y2="166" class="arr" marker-end="url(#a)"/>

<g class="ok"><rect x="450" y="36" width="130" height="46" rx="6" stroke-width="1"/>
<text class="th" x="515" y="64" text-anchor="middle">approved</text></g>
<g class="n"><rect x="450" y="90" width="130" height="46" rx="6" stroke-width="1"/>
<text class="th" x="515" y="118" text-anchor="middle">superseded</text></g>
<g class="no"><rect x="450" y="144" width="130" height="46" rx="6" stroke-width="1"/>
<text class="th" x="515" y="172" text-anchor="middle">rejected</text></g>

<text class="cap" x="340" y="228" text-anchor="middle">Only the Conductor moves an artifact out of in-review.</text>
<text class="cap" x="340" y="250" text-anchor="middle">An approved artifact is immutable — a change is a new version, never an edit.</text>
</svg>
