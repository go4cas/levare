name: Deploy docs to GitHub Pages

# Publishes ONLY docs/guide — not the rest of docs/ (the PRD, security audit findings, code-review
# notes, and the orchestrator prompt stay in the repo, findable by anyone who goes looking, but are
# deliberately not part of the published, linked site). Jekyll processing (via the official
# jekyll-build-pages action) converts the markdown to real HTML and turns README.md into index.html —
# the raw upload-pages-artifact path serves files byte-for-byte with no such conversion, which is why
# the first version of this workflow deployed successfully but 404'd (no index.html existed).

on:
  push:
    branches: [main]
    paths:
      - "docs/guide/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs/guide
          destination: _site

      - name: Upload the built site as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
